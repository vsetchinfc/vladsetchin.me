<div class="container">
  <div class="row">
    <div class="text-center">
      <h1>Gematrix Calculator</h1>
    </div>
    <div class="row">
      <form>
        <!--[formGroup]="gematrixForm"> -->
        <div class="col-lg-12 col-sm-12">
          <label>Enter words to calculate Gematrix:</label>
        </div>
        <div class="col-lg-12 col-sm-12">
          <textarea
            id="wordsList"
            name="wordsList"
            rows="4"
            cols="50"
            (input)="onTextChange($event)"
          ></textarea>
        </div>
      </form>
      <div class="col-lg-12 col-sm-12">
        <label>Calculation Results:</label>
      </div>
      <div class="col-lg-12 col-sm-12">
        <table>
          <thead>
            <tr>
              <th style="border: solid">Entry</th>
              <th style="border: solid">Ordinal</th>
              <th style="border: solid">Reverse Ordinal</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let result of calculationResults">
              <td style="border: solid">{{ result.entry }}</td>
              <td style="border: solid">{{ result.ordinal }}</td>
              <td style="border: solid">{{ result.reverseOrdinal }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
