<div class="main-content-area">
  <div class="container">
    <div class="row">
      <div class="text-center">
        <h1>Gematrix Calculator</h1>
      </div>
      <div class="row">
        <form>
          <div class="col-lg-12 col-sm-12 text-center">
            <input
              class="input-box"
              type="text"
              id="words"
              name="words"
              (input)="onTextChange($event)"
              placeholder="Enter Word, Phrase, or #(s) - (EN or RU):"
            />
          </div>
        </form>
        <div class="col-lg-12 col-sm-12">
          <div></div>
        </div>
        <div class="col-lg-12 col-sm-12">
          <table>
            <thead>
              <tr>
                <th style="border: solid">Entry</th>
                <th style="border: solid">Ordinal</th>
                <th style="border: solid">Reverse Ordinal</th>
                <th style="border: solid">Reduction</th>
                <th style="border: solid">Reverse Reduction</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td style="border: solid">{{ calculationResult.entry }}</td>
                <td style="border: solid">{{ calculationResult.ordinal }}</td>
                <td style="border: solid">{{ calculationResult.reverse }}</td>
                <td style="border: solid">{{ calculationResult.reduction }}</td>
                <td style="border: solid">
                  {{ calculationResult.reverseReduction }}
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
