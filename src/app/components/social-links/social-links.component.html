<ul class="contact" v-if="contact">
  <li class="contact-item">
    <a
      [attr.href]="github_social_contact"
      target="_blank"
      [style.color]="linkColour"
    >
      <i-feather name="github" class="contact-link"></i-feather>
    </a>
  </li>
  <li class="contact-item">
    <a
      [attr.href]="twitter_social_contact"
      target="_blank"
      [style.color]="linkColour"
      class="contact-link"
    >
      <i-feather name="twitter" class="contact-link"></i-feather>
    </a>
  </li>
  <li class="contact-item">
    <a
      [attr.href]="linkedin_social_contact"
      target="_blank"
      [style.color]="linkColour"
    >
      <i-feather name="linkedin" class="contact-link"></i-feather>
    </a>
  </li>
</ul>
